name: Daily Digest

on:
  schedule:
    # 0 1 * * * UTC = 8:00 Da Nang (UTC+7)
    - cron: "0 1 * * *"
    # 0 11 * * * UTC = 18:00 Da Nang (UTC+7)
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger digest on Railway
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          RAILWAY_PUBLIC_DOMAIN: ${{ secrets.RAILWAY_PUBLIC_DOMAIN }}
        run: |
          if [[ -z "$CRON_SECRET" || -z "$RAILWAY_PUBLIC_DOMAIN" ]]; then
            echo "CRON_SECRET and RAILWAY_PUBLIC_DOMAIN must be set in repository secrets."
            exit 1
          fi
          curl -fsS --max-time 180 \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://${RAILWAY_PUBLIC_DOMAIN}/cron/digest"

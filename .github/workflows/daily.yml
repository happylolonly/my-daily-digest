name: Daily Digest

on:
  schedule:
    # UTC → Da Nang (UTC+7). Non-zero minutes avoid GitHub Actions queue peak at :00.
    # 17 0 * * * = 07:17, 23 11 * * * = 18:23
    - cron: "17 0 * * *"
    - cron: "23 11 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger digest on Railway
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          RAILWAY_PUBLIC_DOMAIN: ${{ secrets.RAILWAY_PUBLIC_DOMAIN }}
        run: |
          if [[ -z "$CRON_SECRET" || -z "$RAILWAY_PUBLIC_DOMAIN" ]]; then
            echo "CRON_SECRET and RAILWAY_PUBLIC_DOMAIN must be set in repository secrets."
            exit 1
          fi
          curl -fsS --max-time 180 \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://${RAILWAY_PUBLIC_DOMAIN}/cron/digest"
